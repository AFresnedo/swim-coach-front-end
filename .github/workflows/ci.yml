name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate route types
        run: npx next typegen

      - name: Lint & format (changed files)
        if: github.event_name == 'pull_request'
        run: npm run check:ci

      - name: Lint & format (full repo)
        if: github.event_name == 'push'
        run: npm run check:ci:full

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Validates the Dockerfile/build context actually produce an image —
      # catches breaks (e.g. a COPY'd directory no longer existing) that
      # `npm run build` alone wouldn't, before they reach main and CD's real
      # build-and-push. Intentionally push: false — this is validation only.
      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate route types
        run: npx next typegen

      - name: Lint & format
        run: npm run check

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --run

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high
